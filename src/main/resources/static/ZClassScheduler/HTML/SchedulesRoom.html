<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZClassScheduler</title>

    <!-- Core Styles -->
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/ScheduleGrid.css">
</head>

<body>

<header id="global-header" class="topbar"></header>

<div class="container">
    <aside id="global-nav" class="sidebar"></aside>

    <main>

        <div class="page-header">
            <h2>Room Schedule</h2>
        </div>

        <!-- 🔍 Search -->
        <div class="search">
            <div class="search-wrapper">
                <span class="search-icon">🔎</span>

                <input
                        type="text"
                        id="roomSearch"
                        placeholder="Search room..."
                        autocomplete="off"
                >

                <button id="clearRoomSearch" class="clear-btn">✕</button>

                <div id="roomDropdown" class="search-dropdown"></div>
            </div>
        </div>

        <!-- Dynamic Title -->
        <h3 id="roomTitle">Weekly Room Schedule</h3>

        <!-- Schedule Table -->
        <table class="schedule-table">
            <thead>
            <tr>
                <th colspan="2">TIME</th>
                <th>MONDAY</th>
                <th>TUESDAY</th>
                <th>WEDNESDAY</th>
                <th>THURSDAY</th>
                <th>FRIDAY</th>
                <th>SATURDAY</th>
            </tr>
            </thead>

            <tbody id="roomGrid">
            <!-- Generated by SchedulesRoom.js -->
            </tbody>
        </table>

    </main>
</div>

<script src="../JS/load-global.js"></script>
<script src="../JS/GlobalSidebar.js"></script>

<!-- ✅ Department flag (change this per department page) -->
<script>
    window.DEPARTMENT = "STI";  /* JHS | SHS | NAMEI */
</script>

<script type="module" src="../JS/SchedulesRoom.js"></script>

</body>
</html>
