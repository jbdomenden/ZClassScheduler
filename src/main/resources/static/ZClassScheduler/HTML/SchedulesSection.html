<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZClassScheduler</title>

    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/ManageDesign.css">
    <link rel="stylesheet" href="../CSS/ScheduleGrid.css">
    <link rel="icon" type="image/x-icon" href="/ZClassScheduler/Assets/zclassscheduler.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ZClassScheduler/Assets/zclassscheduler-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/ZClassScheduler/Assets/zclassscheduler-64.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ZClassScheduler/Assets/zclassscheduler-256.png" />
</head>


<body>

<header id="global-header" class="topbar"></header>

<div class="container">
    <aside id="global-nav" class="sidebar"></aside>

    <main class="crud-scope no-page-scroll">

        <div class="page-header">
            <h2>Section Schedule</h2>
            <p class="subtitle">Weekly timetable for a selected section</p>
        </div>

        <section class="panel">
            <div class="panel-header" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                <div class="search" style="margin:0;">
                    <div class="search-wrapper">

                        <span class="search-icon">&#128269;</span>

                        <input
                                type="text"
                                id="sectionSearch"
                                placeholder="Search section..."
                                autocomplete="off"
                        >

                        <button
                                id="clearSectionSearch"
                                class="clear-btn"
                                type="button">&times;</button>

                        <div
                                id="sectionDropdown"
                                class="search-dropdown"></div>

                    </div>
                </div>

                <button id="printBtn" class="btn btn-secondary" type="button" style="margin-left:auto;" data-tooltip="Print this schedule">Print</button>
            </div>

            <div style="padding:14px 16px;">
                <h3 id="sectionTitle" style="margin:0 0 12px;">Weekly Section Schedule</h3>

                <div class="schedule-grid">
                    <table class="schedule-table">

                        <thead>
                        <tr>
                            <th colspan="2">TIME</th>
                            <th>MONDAY</th>
                            <th>TUESDAY</th>
                            <th>WEDNESDAY</th>
                            <th>THURSDAY</th>
                            <th>FRIDAY</th>
                            <th>SATURDAY</th>
                        </tr>
                        </thead>

                        <tbody id="sectionGrid">
                        <!-- Generated by SchedulesSection.js -->
                        </tbody>

                    </table>
                </div>
            </div>
        </section>

    </main>
</div>

<script src="../JS/load-global.js"></script>
<script src="../JS/GlobalSidebar.js"></script>
<script type="module" src="../JS/SchedulesSection.js"></script>

</body>
</html>
