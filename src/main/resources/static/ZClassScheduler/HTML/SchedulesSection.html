<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZClassScheduler</title>

    <!-- Core Styles -->
    <link rel="stylesheet" href="../CSS/base.css">

    <!-- Shared Schedule Styling -->
    <link rel="stylesheet" href="../CSS/ScheduleGrid.css">
</head>

<body>

<header id="global-header" class="topbar"></header>

<div class="container">
    <aside id="global-nav" class="sidebar"></aside>

    <main>

        <div class="page-header">
            <h2>Section Schedule</h2>
        </div>

        <!-- 🔍 Search -->
        <div class="search">
            <div class="search-wrapper">

                <span class="search-icon">🔎</span>

                <input
                        type="text"
                        id="sectionSearch"
                        placeholder="Search section..."
                        autocomplete="off"
                >

                <button
                        id="clearSectionSearch"
                        class="clear-btn"
                        type="button">
                    ✕
                </button>

                <div
                        id="sectionDropdown"
                        class="search-dropdown">
                </div>

            </div>
        </div>

        <!-- Dynamic Title -->
        <h3 id="sectionTitle">
            Weekly Section Schedule
        </h3>

        <!-- SAME TABLE STRUCTURE -->
        <table class="schedule-table">

            <thead>
            <tr>
                <th colspan="2">TIME</th>
                <th>MONDAY</th>
                <th>TUESDAY</th>
                <th>WEDNESDAY</th>
                <th>THURSDAY</th>
                <th>FRIDAY</th>
                <th>SATURDAY</th>
            </tr>
            </thead>

            <tbody id="sectionGrid">
            <!-- Generated by SchedulesSection.js -->
            </tbody>

        </table>

    </main>
</div>

<script src="../JS/load-global.js"></script>
<script src="../JS/GlobalSidebar.js"></script>

<script type="module" src="../JS/SchedulesSection.js"></script>

</body>
</html>
