<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZClassScheduler</title>

    <!-- Core Layout -->
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/ManageDesign.css">

    <!-- Table Styling -->
    <link rel="stylesheet" href="../CSS/ScheduleList.css">

    <!-- Page Specific -->
    <link rel="stylesheet" href="../CSS/SchedulesOverview.css">
    <link rel="icon" type="image/x-icon" href="/ZClassScheduler/Assets/zclassscheduler.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ZClassScheduler/Assets/zclassscheduler-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/ZClassScheduler/Assets/zclassscheduler-64.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ZClassScheduler/Assets/zclassscheduler-256.png" />
</head>


<body>

<header id="global-header" class="topbar"></header>

<div class="container">

    <!-- Sidebar -->
    <aside id="global-nav" class="sidebar"></aside>

    <main class="crud-scope no-page-scroll">

        <!-- Page Header -->
        <div class="page-header">
            <h2>All Schedules</h2>
            <p class="subtitle">Section-based master schedule</p>
        </div>

        <!-- Master Schedule Panel -->
        <section class="panel">

            <div class="panel-header">
                <!-- Search Component (Loaded from GlobalSearch.html) -->
                <div id="searchContainer"></div>

                <div class="panel-actions">
                    <button id="refreshOverviewBtn" class="btn btn-secondary" type="button">Refresh</button>
                </div>
            </div>

            <!-- Schedule Table -->
            <div class="table-wrapper">
                <table id="scheduleTable">
                    <thead>
                    <tr>
                        <th>SECTION</th>
                        <th>COURSE CODE</th>
                        <th>COURSE DESCRIPTION</th>
                        <th>DAY</th>
                        <th colspan="2">TIME</th>
                        <th>ROOM</th>
                        <th>INSTRUCTOR</th>
                    </tr>
                    </thead>

                    <tbody>
                    <!-- Rendered dynamically by ScheduleListEngine -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</div>

<!-- Global Layout Loader -->
<script src="../JS/load-global.js"></script>
<script src="../JS/GlobalSidebar.js"></script>


<!-- Overview Controller (imports ScheduleListEngine + DB) -->
<script type="module" src="../JS/SchedulesOverview.js"></script>

</body>
</html>
