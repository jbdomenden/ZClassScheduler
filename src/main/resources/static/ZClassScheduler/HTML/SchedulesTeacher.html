<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZClassScheduler</title>

    <!-- Core Styles -->
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/ScheduleGrid.css">
</head>

<body>

<header id="global-header" class="topbar"></header>

<div class="container">
    <aside id="global-nav" class="sidebar"></aside>

    <!-- MAIN CONTENT -->
    <main>

        <div class="page-header">
            <h2>Teacher Schedule</h2>
        </div>

        <!-- 🔍 Search -->
        <div class="search">
            <div class="search-wrapper">
                <span class="search-icon">🔎</span>

                <input
                        type="text"
                        id="teacherSearch"
                        placeholder="Search teacher..."
                        autocomplete="off"
                >

                <button id="clearTeacherSearch" class="clear-btn">✕</button>

                <div id="teacherDropdown" class="search-dropdown"></div>
            </div>
        </div>

        <!-- Dynamic Title -->
        <h3 id="teacherTitle">
            Weekly Teacher Schedule
        </h3>

        <!-- Schedule Table -->
        <table class="schedule-table">

            <thead>
            <tr>
                <th colspan="2">TIME</th>
                <th>MONDAY</th>
                <th>TUESDAY</th>
                <th>WEDNESDAY</th>
                <th>THURSDAY</th>
                <th>FRIDAY</th>
                <th>SATURDAY</th>
            </tr>
            </thead>

            <tbody id="teacherGrid">
            <!-- Generated by SchedulesTeacher.js -->
            </tbody>

        </table>

    </main>
</div>

<!-- Global Layout Loader -->
<script src="../JS/load-global.js"></script>
<script src="../JS/GlobalSidebar.js"></script>


<!-- Module Script -->
<script type="module" src="../JS/SchedulesTeacher.js"></script>


</body>
</html>
