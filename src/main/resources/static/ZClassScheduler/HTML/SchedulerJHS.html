<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZClassScheduler - JHS Schedule</title>

    <!-- Global / shared styles -->
    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/ManageDesign.css" />

    <!-- Scheduler theme (IMPORTANT) -->
    <link rel="stylesheet" href="../CSS/SchedulerDesign.css" />

    <link rel="icon" type="image/x-icon" href="/ZClassScheduler/Assets/zclassscheduler.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ZClassScheduler/Assets/zclassscheduler-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/ZClassScheduler/Assets/zclassscheduler-64.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ZClassScheduler/Assets/zclassscheduler-256.png" />
</head>


<body>
<!-- Global header injected by load-global.js -->
<header id="global-header" class="topbar"></header>

<div class="container">
    <!-- Global sidebar injected by GlobalSidebar.js -->
    <aside id="global-nav" class="sidebar"></aside>

    <main class="crud-scope">

        <!-- Page title block (same feel as STI) -->
        <div class="page-header">
            <h2>JHS Schedule</h2>
            <p class="subtitle">Create blocks and assign schedules (Grade 7-10)</p>
        </div>

        <section class="panel">
            <div class="panel-header">
                <div id="searchContainer"></div>

                <div class="panel-actions">
            <button id="openWizardBtn" class="btn btn-primary" type="button" data-tooltip="Add a new class schedule">+ Add Schedule</button>
            <button id="refreshBtn" class="btn btn-secondary" type="button" data-tooltip="Reload schedules">Refresh</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="blocksTable">
                    <thead>
                    <tr>
                        <th data-key="section">Section<span class="sort-icon"></span></th>
                        <th data-key="program">Program<span class="sort-icon"></span></th>
                        <th data-key="grade">Grade<span class="sort-icon"></span></th>
                        <th data-key="status">Status<span class="sort-icon"></span></th>
                        <th width="220">Actions</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- =========================
             CREATE BLOCK MODAL (Wizard)
             ========================= -->
        <div id="wizardModal" class="modal hidden">
            <div class="modal-content modal-lg">
                <h3 id="wizardTitle">Create Schedule Block</h3>

                <form id="wizardForm" class="crud-scope">
                    <div class="form-grid">

                        <div class="form-field">
                            <label>Program</label>
                            <select id="programSelect" required>
                                <option value="" disabled selected>Select Program</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label>Curriculum</label>
                            <select id="curriculumSelect" required>
                                <option value="" disabled selected>Select Curriculum</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label>Grade</label>
                            <select id="gradeSelect" required>
                                <option value="" disabled selected>Select Grade</option>
                                <option value="7">Grade 7</option>
                                <option value="8">Grade 8</option>
                                <option value="9">Grade 9</option>
                                <option value="10">Grade 10</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label>Section Name</label>
                            <input
                                    id="sectionNameInput"
                                    type="text"
                                    placeholder="e.g., Diamond"
                                    required
                            />
                        </div>

                    </div>

                    <div class="modal-actions">
                        <button type="submit" class="btn btn-primary">Create Block</button>
                        <button type="button" id="wizardCancelBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- =========================
             EDIT ROW MODAL
             ========================= -->
        <div id="editRowModal" class="modal hidden">
            <div class="modal-content">
                <h3 id="editRowTitle">Edit Schedule</h3>

                <div id="editRowMeta" style="margin:-6px 0 10px;font-size:12px;opacity:.85;"></div>

                <form id="editRowForm" class="crud-scope">
                    <input type="hidden" id="editScheduleId"/>

                    <label>Day</label>
                    <select id="editDay">
                        <option value="">(Unset)</option>
                        <option value="MONDAY">MONDAY</option>
                        <option value="TUESDAY">TUESDAY</option>
                        <option value="WEDNESDAY">WEDNESDAY</option>
                        <option value="THURSDAY">THURSDAY</option>
                        <option value="FRIDAY">FRIDAY</option>
                        <option value="SATURDAY">SATURDAY</option>
                    </select>

                    <div class="form-row">
                        <div class="form-field">
                            <label>Time Start</label>
                            <select id="editStart">
                                <option value="">(Unset)</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label>Time End</label>
                            <select id="editEnd">
                                <option value="">(Unset)</option>
                            </select>
                        </div>
                    </div>

                    <label>Room</label>
                    <select id="editRoom">
                        <option value="">(Unset)</option>
                    </select>

                    <label>Instructor</label>
                    <select id="editInstructor">
                        <option value="">(Unset)</option>
                    </select>

                    <div class="hint" style="margin-top:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
                            <b>Suggestions</b>
                    <button type="button" id="editSuggestBtn" class="btn btn-secondary" data-tooltip="Suggest a free room/instructor">Suggest</button>
                        </div>
                        <div id="editSuggestBox" class="muted" style="margin-top:8px;white-space:pre-wrap;"></div>
                    </div>

                    <div class="modal-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" id="editCancelBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

    </main>
</div>

<!-- Global injectors -->
<script src="../JS/load-global.js"></script>
<script src="../JS/GlobalSidebar.js"></script>

<!-- Page JS -->
<script type="module" src="../JS/SchedulerJHS.js"></script>
</body>
</html>
