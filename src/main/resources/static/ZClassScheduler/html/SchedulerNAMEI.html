<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZClassScheduler</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/ManageDesign.css" />
    <link rel="stylesheet" href="../css/SchedulerDesign.css" />
    <link rel="icon" type="image/x-icon" href="/ZClassScheduler/Assets/zclassscheduler.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ZClassScheduler/Assets/zclassscheduler-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/ZClassScheduler/Assets/zclassscheduler-64.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ZClassScheduler/Assets/zclassscheduler-256.png" />
</head>


<body>
<header id="global-header" class="topbar"></header>

<div class="container">
    <aside id="global-nav" class="sidebar"></aside>

    <main class="crud-scope">

        <div class="page-header">
            <h2>NAMEI Tertiary Schedule</h2>
            <p class="subtitle">Create section blocks, then assign day/time/room/instructor</p>
        </div>

        <section class="panel">

            <div class="panel-header">
                <div id="searchContainer"></div>

                <div class="panel-actions">
            <button id="addScheduleBtn" class="btn btn-primary" type="button" data-tooltip="Add a new class schedule">+ Add Schedule</button>
            <button id="refreshBtn" class="btn btn-secondary" type="button" data-tooltip="Reload schedules">Refresh</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="blocksTable">
                    <thead>
                    <tr>
                        <th data-key="sectionCode">Section<span class="sort-icon"></span></th>
                        <th data-key="courseCode">Program<span class="sort-icon"></span></th>
                        <th data-key="year">Year<span class="sort-icon"></span></th>
                        <th data-key="term">Term<span class="sort-icon"></span></th>
                        <th data-key="active">Status<span class="sort-icon"></span></th>
                        <th width="210">Actions</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </section>

    </main>
</div>

<!-- Wizard Modal -->
<div id="wizardModal" class="modal hidden">
    <div class="modal-content modal-lg">
        <h3>Create Schedule Block</h3>

        <form id="wizardForm" class="crud-scope">
            <div class="form-grid">

                <div class="form-field">
                    <label>Program / Course</label>
                    <select id="programSelect" required>
                        <option value="" disabled selected>Select Program</option>
                    </select>
                </div>

                <div class="form-field">
                    <label>Curriculum</label>
                    <select id="curriculumSelect" required>
                        <option value="" disabled selected>Select Curriculum</option>
                    </select>
                </div>

                <div class="form-field">
                    <label>Year</label>
                    <select id="yearSelect" required>
                        <option value="" disabled selected>Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>

                <div class="form-field">
                    <label>Term</label>
                    <select id="termSelect" required>
                        <option value="" disabled selected>Select Term</option>
                        <option value="1">1st Term</option>
                        <option value="2">2nd Term</option>
                    </select>
                </div>

            </div>

            <div class="modal-actions">
                <button type="submit" class="btn btn-primary">Create Block</button>
                <button type="button" id="wizardCancelBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Row Modal -->
<div id="editRowModal" class="modal hidden">
    <div class="modal-content">
        <h3 id="editRowTitle">Edit Schedule</h3>
        <form id="editRowForm" class="crud-scope">

            <label>Day</label>
            <select id="daySelect">
                <option value="">(Unset)</option>
                <option value="MONDAY">MONDAY</option>
                <option value="TUESDAY">TUESDAY</option>
                <option value="WEDNESDAY">WEDNESDAY</option>
                <option value="THURSDAY">THURSDAY</option>
                <option value="FRIDAY">FRIDAY</option>
                <option value="SATURDAY">SATURDAY</option>
                <option value="SUNDAY">SUNDAY</option>
            </select>

            <div class="form-row">
                <div class="form-field">
                    <label>Time Start</label>
                    <select id="timeStartSelect">
                        <option value="">(Unset)</option>
                    </select>
                </div>

                <div class="form-field">
                    <label>Time End</label>
                    <select id="timeEndSelect">
                        <option value="">(Unset)</option>
                    </select>
                </div>
            </div>

            <label>Room</label>
            <select id="roomSelect">
                <option value="">(Unset)</option>
            </select>

            <label>Instructor</label>
            <select id="instructorSelect">
                <option value="">(Unset)</option>
            </select>

            <div class="hint" style="margin-top:12px;">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
                    <b>Suggestions</b>
                    <button type="button" id="editSuggestBtn" class="btn btn-secondary" data-tooltip="Suggest a free room/instructor">Suggest</button>
                </div>
                <div id="editSuggestBox" class="muted" style="margin-top:8px;white-space:pre-wrap;"></div>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" id="editCancelBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/load-global.js"></script>
<script src="../js/GlobalSidebar.js"></script>
<script type="module" src="../js/SchedulerNAMEI.js"></script>

</body>
</html>
