<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZClassScheduler</title>

    <!-- Shared/base styles used across pages -->
    <link rel="stylesheet" href="/ZclassScheduler/css/base.css" />
    <!-- Page-specific styles for CRUD layout + modal UI -->
    <link rel="stylesheet" href="/ZclassScheduler/css/ManageDesign.css" />
    <link rel="icon" type="image/x-icon" href="/ZClassScheduler/Assets/zclassscheduler.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ZClassScheduler/Assets/zclassscheduler-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/ZClassScheduler/Assets/zclassscheduler-64.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ZClassScheduler/Assets/zclassscheduler-256.png" />
</head>


<body>
<!-- Global header populated dynamically (see load-global.js) -->
<header id="global-header" class="topbar"></header>

<div class="container">
    <!-- Global sidebar navigation populated dynamically (see load-global.js / GlobalSidebar.js) -->
    <aside id="global-nav" class="sidebar"></aside>

    <main class="crud-scope">
        <div class="page-header">
            <h2>Room Management</h2>
            <p class="subtitle">Create, update, and manage classroom records</p>
        </div>

        <!-- Main panel: search + action button + room list table -->
        <section class="panel">
            <div class="panel-header">
                <!-- Search UI is injected dynamically (typically by ManageRoom.js) -->
                <div id="searchContainer"></div>

                <!-- Primary action: open modal to add a room -->
                <button id="addRoomBtn" class="btn btn-primary" type="button" data-tooltip="Create a new room">+ Add Room</button>
            </div>

            <div class="table-wrapper">
                <table id="roomTable">
                    <thead>
                    <tr>
                        <th data-key="code">Room<span class="sort-icon"></span></th>
                        <th data-key="floor">Floor<span class="sort-icon"></span></th>
                        <th data-key="capacity">Capacity<span class="sort-icon"></span></th>
                        <th data-key="type">Type<span class="sort-icon"></span></th>
                        <th data-key="status">Status<span class="sort-icon"></span></th>
                        <th width="150">Actions</th>
                    </tr>
                    </thead>

                    <!-- IMPORTANT: Rows are rendered dynamically via ManageRoom.js -->
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- Room modal (hidden by default; visibility controlled by ManageRoom.js) -->
<!-- IMPORTANT: "hidden" class toggles display without removing the modal from the DOM -->
<div id="roomModal" class="modal hidden">
    <div class="modal-content">
        <!-- Modal title updates depending on create/edit mode -->
        <h3 id="modalTitle">Add Room</h3>

        <!-- Room form: used for both add and edit flows -->
        <form id="roomForm">
            <!-- Hidden primary key for edit mode -->
            <input type="hidden" id="roomId" />

            <label>Room Code</label>
            <input type="text" id="roomCode" required />

            <label>Floor</label>
            <input type="text" id="floor" required />

            <label>Capacity</label>
            <input type="number" id="capacity" min="1" required />

            <label>Type</label>
            <select id="type">
                <option value="Lecture">Lecture</option>
                <option value="Laboratory">Laboratory</option>
                <option value="Multipurpose">Multipurpose</option>
            </select>

            <label>Status</label>
            <select id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>

            <!-- Form actions: submit saves; cancel closes without saving -->
            <div class="crud-scope">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" id="cancelBtn" class="btn btn-secondary">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Loads shared header/sidebar content into #global-header and #global-nav -->
<script src="/ZclassScheduler/js/load-global.js"></script>

<!-- Navigation interactions (e.g., sidebar toggle, logout) -->
<script src="/ZclassScheduler/js/GlobalSidebar.js"></script>

<!-- Page module: room CRUD logic, table rendering, modal control -->
<script type="module" src="/ZclassScheduler/js/ManageRoom.js"></script>
</body>
</html>
