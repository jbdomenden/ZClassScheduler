<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZClassScheduler</title>

    <link rel="stylesheet" href="/ZClassScheduler/css/base.css" />
    <link rel="stylesheet" href="/ZClassScheduler/css/ManageDesign.css" />
    <link rel="icon" type="image/x-icon" href="/ZClassScheduler/Assets/zclassscheduler.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ZClassScheduler/Assets/zclassscheduler-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/ZClassScheduler/Assets/zclassscheduler-64.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ZClassScheduler/Assets/zclassscheduler-256.png" />
</head>

<body>
<header id="global-header" class="topbar"></header>

<div class="container">
    <aside id="global-nav" class="sidebar"></aside>

    <main class="crud-scope">
        <div class="page-header">
            <h2>Audit Logs</h2>
            <p class="subtitle">SUPER_ADMIN view of privileged CRUD actions (ADMIN, SUPER_ADMIN)</p>
        </div>

        <section class="panel">
            <div class="panel-header" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                <input id="q" placeholder="Search (email, action, entity, message)" style="padding:10px 12px;border-radius:10px;border:1px solid #cbd5e1;min-width:280px;flex:1;" />

                <select id="roleFilter" style="padding:10px 12px;border-radius:10px;border:1px solid #cbd5e1;background:#fff;">
                    <option value="">All Roles</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="SUPER_ADMIN">SUPER_ADMIN</option>
                </select>

                <select id="successFilter" style="padding:10px 12px;border-radius:10px;border:1px solid #cbd5e1;background:#fff;">
                    <option value="">All Results</option>
                    <option value="true">Success</option>
                    <option value="false">Failed</option>
                </select>

                    <button id="refreshBtn" class="btn btn-secondary" type="button" data-tooltip="Reload audit logs">Refresh</button>
                    <button id="printBtn" class="btn btn-secondary" type="button" data-tooltip="Print this table">Print</button>
            </div>

            <div class="table-wrapper">
                <table id="auditTable">
                    <thead>
                    <tr>
                        <th>Time</th>
                        <th>Role</th>
                        <th>Who</th>
                        <th>What Happened</th>
                        <th>Area</th>
                        <th>Result</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody id="auditTbody">
                    <tr><td colspan="7" class="muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="display:flex;justify-content:flex-end;gap:10px;padding:12px 0 0;">
                <button id="loadMoreBtn" class="btn btn-secondary" type="button" style="display:none;" data-tooltip="Load more entries">Load More</button>
            </div>
        </section>
    </main>
</div>

<script src="/ZClassScheduler/js/load-global.js"></script>
<script src="/ZClassScheduler/js/GlobalSidebar.js"></script>
<script type="module" src="/ZClassScheduler/js/AuditLogs.js"></script>
</body>
</html>
